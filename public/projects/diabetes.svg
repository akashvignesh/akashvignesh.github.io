<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <defs>
    <pattern id="gd" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#16213a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="#0b1120"/>
  <rect width="640" height="360" fill="url(#gd)"/>
  <rect width="640" height="4" fill="#818cf8"/>

  <!-- Left: classifier decision boundary with two classes -->
  <rect x="60" y="80" width="220" height="180" rx="10" fill="#0f1b30" stroke="#818cf8" stroke-opacity="0.4"/>
  <line x1="84" y1="240" x2="84" y2="100" stroke="#475569" stroke-width="1.5"/>
  <line x1="84" y1="240" x2="256" y2="240" stroke="#475569" stroke-width="1.5"/>
  <!-- decision boundary -->
  <line x1="96" y1="232" x2="248" y2="112" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="6 5"/>
  <!-- class A (low risk) -->
  <g fill="#6366f1">
    <circle cx="112" cy="210" r="5"/><circle cx="132" cy="224" r="5"/><circle cx="108" cy="184" r="5"/>
    <circle cx="146" cy="206" r="5"/><circle cx="126" cy="196" r="5"/>
  </g>
  <!-- class B (high risk) -->
  <g fill="#a5b4fc">
    <circle cx="206" cy="138" r="5"/><circle cx="226" cy="150" r="5"/><circle cx="200" cy="120" r="5"/>
    <circle cx="180" cy="134" r="5"/><circle cx="216" cy="170" r="5"/>
  </g>

  <!-- Right: model comparison bars, best highlighted -->
  <line x1="330" y1="250" x2="582" y2="250" stroke="#1e293b" stroke-width="2"/>
  <rect x="346" y="196" width="34" height="54" rx="4" fill="#1e293b"/>
  <rect x="402" y="176" width="34" height="74" rx="4" fill="#1e293b"/>
  <rect x="458" y="140" width="34" height="110" rx="4" fill="#818cf8" fill-opacity="0.9"/>
  <rect x="514" y="186" width="34" height="64" rx="4" fill="#1e293b"/>
  <!-- best marker -->
  <path d="M475 128 l 6 10 h -12 z" fill="#a5b4fc"/>
  <text x="475" y="120" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="12" font-weight="bold">best</text>

  <text x="60" y="318" fill="#64748b" font-family="monospace" font-size="17">diabetes risk · model comparison</text>
</svg>
