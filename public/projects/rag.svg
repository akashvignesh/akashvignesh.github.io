<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" fill="none">
  <defs>
    <pattern id="gr" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#16213a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="#0b1120"/>
  <rect width="640" height="360" fill="url(#gr)"/>
  <rect width="640" height="4" fill="#818cf8"/>

  <!-- Query box -->
  <rect x="48" y="150" width="120" height="60" rx="10" fill="#0f1b30" stroke="#818cf8" stroke-opacity="0.6"/>
  <rect x="66" y="168" width="84" height="9" rx="4" fill="#1e293b"/>
  <rect x="66" y="186" width="60" height="9" rx="4" fill="#1e293b"/>
  <text x="108" y="138" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="13">query</text>

  <!-- Query -> retriever -->
  <path d="M168 180 H 232" stroke="#475569" stroke-width="2"/>
  <path d="M232 180 l -10 -5 v 10 z" fill="#475569"/>

  <!-- Resume PDF feeding the store -->
  <rect x="236" y="70" width="58" height="72" rx="6" fill="#0f1b30" stroke="#34d399" stroke-opacity="0.7"/>
  <rect x="248" y="86" width="34" height="7" rx="3" fill="#1e293b"/>
  <rect x="248" y="100" width="34" height="7" rx="3" fill="#1e293b"/>
  <rect x="248" y="114" width="22" height="7" rx="3" fill="#1e293b"/>
  <text x="265" y="158" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">resume.pdf</text>
  <path d="M265 142 V 168" stroke="#34d399" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ChromaDB vector store (cylinder) -->
  <g>
    <ellipse cx="265" cy="174" rx="34" ry="11" fill="#0f1b30" stroke="#818cf8" stroke-width="2"/>
    <path d="M231 174 V 214 A 34 11 0 0 0 299 214 V 174" fill="#0f1b30" stroke="#818cf8" stroke-width="2"/>
    <ellipse cx="265" cy="174" rx="34" ry="11" fill="none" stroke="#818cf8" stroke-opacity="0.5"/>
    <circle cx="252" cy="192" r="3" fill="#a5b4fc"/>
    <circle cx="266" cy="198" r="3" fill="#a5b4fc" fill-opacity="0.7"/>
    <circle cx="278" cy="190" r="3" fill="#a5b4fc" fill-opacity="0.5"/>
  </g>
  <text x="265" y="240" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="12">ChromaDB</text>

  <!-- retriever -> LLM -->
  <path d="M300 188 C 360 188, 360 158, 404 158" stroke="#475569" stroke-width="2" fill="none"/>
  <path d="M404 158 l -10 -5 v 10 z" fill="#475569"/>

  <!-- LLM hexagon -->
  <polygon points="470,118 506,138 506,178 470,198 434,178 434,138" fill="#0f1b30" stroke="#818cf8" stroke-width="2"/>
  <text x="470" y="163" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="15" font-weight="bold">Gemini</text>

  <!-- LLM -> answer -->
  <path d="M506 158 H 572" stroke="#475569" stroke-width="2"/>
  <path d="M572 158 l -10 -5 v 10 z" fill="#475569"/>
  <rect x="540" y="206" width="60" height="44" rx="8" fill="#818cf8" fill-opacity="0.18" stroke="#818cf8"/>
  <text x="570" y="232" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="12">answer</text>
  <path d="M570 198 V 206" stroke="#818cf8" stroke-opacity="0.6" stroke-width="1.5"/>

  <text x="48" y="318" fill="#64748b" font-family="monospace" font-size="17">RAG · LangChain · ChromaDB · Gemini</text>
</svg>
